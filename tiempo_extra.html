<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiempo Extra | CCSS Interino</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ccss: {
              50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd',
              400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8',
              800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { font-family: 'Inter', sans-serif; }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .modal-enter { animation: modalEnter 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @keyframes modalEnter {
      from { opacity: 0; transform: scale(0.95) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    
    .input-ccss {
      @apply w-full px-3 py-2 border border-ccss-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 text-sm transition-all;
    }
    
    .input-ccss:hover { border-color: #93c5fd; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
    
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-ccss-50 via-white to-ccss-100 min-h-screen">

  <!-- Header -->
  <nav class="bg-white/80 backdrop-blur-md border-b border-ccss-200 sticky top-0 z-40 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <button onclick="location.href='dashboard.html'" class="p-2 hover:bg-ccss-100 rounded-lg transition-colors text-ccss-600">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </button>
          <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-amber-700 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/30">
            <i data-lucide="zap" class="text-white w-6 h-6"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-ccss-900 leading-tight">Tiempo Extra</h1>
            <p class="text-xs text-ccss-500 font-medium">Registro de horas extraordinarias</p>
          </div>
        </div>
        
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-semibold text-ccss-900" id="nombreUsuario">Usuario</p>
            <p class="text-xs text-ccss-500" id="rolUsuario">Rol</p>
          </div>
          <div class="w-10 h-10 bg-gradient-to-br from-ccss-500 to-ccss-700 rounded-full flex items-center justify-center text-white font-bold shadow-md" id="userAvatar">
            US
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
    
    <!-- Formulario -->
    <div class="glass-panel rounded-2xl border border-ccss-200 shadow-lg p-6 mb-8 no-print">
      <h2 class="text-lg font-bold text-ccss-900 mb-6 flex items-center gap-2">
        <i data-lucide="plus-circle" class="w-5 h-5 text-ccss-600"></i>
        Nuevo Registro de Tiempo Extra
      </h2>
      
      <form id="formExtra" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
          
          <!-- Fecha -->
          <div>
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Fecha <span class="text-red-500">*</span></label>
            <input type="date" id="fechaExtra" required 
              class="w-full px-4 py-2.5 border border-ccss-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 transition-all hover:border-ccss-400">
          </div>
          
          <!-- Hora Entrada -->
          <div>
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Hora Entrada <span class="text-red-500">*</span></label>
            <input type="time" id="entradaExtra" required 
              class="w-full px-4 py-2.5 border border-ccss-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 text-center transition-all hover:border-ccss-400">
          </div>
          
          <!-- Hora Salida -->
          <div>
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Hora Salida <span class="text-red-500">*</span></label>
            <input type="time" id="salidaExtra" required 
              class="w-full px-4 py-2.5 border border-ccss-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 text-center transition-all hover:border-ccss-400">
          </div>
          
          <!-- Total Horas (calculado) -->
          <div>
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Total Horas</label>
            <input type="text" id="horasExtra" readonly 
              class="w-full px-4 py-2.5 border border-ccss-200 rounded-xl bg-ccss-50 text-ccss-900 font-bold text-center">
          </div>
          
          <!-- Área -->
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Área <span class="text-red-500">*</span></label>
            <input type="text" id="areaExtra" required placeholder="Ej: Hospital San Juan de Dios" 
              class="w-full px-4 py-2.5 border border-ccss-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 transition-all hover:border-ccss-400">
          </div>
          
          <!-- Observaciones -->
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-ccss-700 mb-1.5">Observaciones</label>
            <input type="text" id="observacionesExtra" placeholder="Motivo del tiempo extra..." 
              class="w-full px-4 py-2.5 border border-ccss-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-ccss-500 focus:border-transparent bg-white text-ccss-900 transition-all hover:border-ccss-400">
          </div>
        </div>
        
        <div class="flex gap-3 pt-4 border-t border-ccss-100">
          <button type="submit" 
            class="px-6 py-3 bg-ccss-600 hover:bg-ccss-700 text-white rounded-xl font-semibold transition-colors shadow-lg shadow-ccss-500/20 flex items-center gap-2">
            <i data-lucide="save" class="w-5 h-5"></i>
            Guardar Registro
          </button>
          <button type="button" onclick="limpiarFormularioExtra()" 
            class="px-6 py-3 bg-white border border-ccss-300 text-ccss-700 rounded-xl font-semibold hover:bg-ccss-50 transition-colors">
            Limpiar
          </button>
        </div>
      </form>
    </div>

    <!-- Filtros y Acciones -->
    <div class="glass-panel rounded-2xl border border-ccss-200 shadow-lg p-6 mb-6 no-print">
      <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
        <div class="flex items-center gap-2">
          <i data-lucide="filter" class="w-5 h-5 text-ccss-600"></i>
          <h3 class="font-bold text-ccss-900">Filtros</h3>
        </div>
        
        <div class="flex flex-wrap items-center gap-3">
          <select id="mesFiltroExtra" 
            class="px-3 py-2 border border-ccss-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 text-sm">
            <option value="">Todos los meses</option>
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
          </select>
          
          <select id="anioFiltroExtra" 
            class="px-3 py-2 border border-ccss-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 text-sm">
          </select>
          
          <button id="btnFiltrar" 
            class="px-4 py-2 bg-ccss-600 hover:bg-ccss-700 text-white rounded-lg font-medium transition-colors shadow-sm shadow-ccss-500/20 flex items-center gap-1">
            <i data-lucide="search" class="w-4 h-4"></i>
            Filtrar
          </button>
          
          <div class="flex gap-2 border-l border-ccss-200 pl-3">
            <button id="btnExportarPDF" 
              class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-700 border border-red-200 rounded-lg font-medium transition-colors flex items-center gap-1">
              <i data-lucide="file-text" class="w-4 h-4"></i>
              PDF
            </button>
            <button id="btnImprimir" 
              class="px-4 py-2 bg-gray-50 hover:bg-gray-100 text-gray-700 border border-gray-200 rounded-lg font-medium transition-colors flex items-center gap-1">
              <i data-lucide="printer" class="w-4 h-4"></i>
              Imprimir
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Totales -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 no-print">
      <div class="bg-white rounded-xl p-4 border border-ccss-200 shadow-sm border-l-4 border-l-ccss-500">
        <p class="text-xs font-semibold text-ccss-500 uppercase tracking-wider">Total Registros</p>
        <p class="text-2xl font-bold text-ccss-900" id="totalRegistros">0</p>
      </div>
      <div class="bg-white rounded-xl p-4 border border-ccss-200 shadow-sm border-l-4 border-l-violet-500">
        <p class="text-xs font-semibold text-ccss-500 uppercase tracking-wider">Horas Totales</p>
        <p class="text-2xl font-bold text-ccss-900" id="totalHoras">0h 0m</p>
      </div>
      <div class="bg-white rounded-xl p-4 border border-ccss-200 shadow-sm border-l-4 border-l-emerald-500">
        <p class="text-xs font-semibold text-ccss-500 uppercase tracking-wider">Pagados</p>
        <p class="text-2xl font-bold text-ccss-900" id="totalPagados">0</p>
      </div>
      <div class="bg-white rounded-xl p-4 border border-ccss-200 shadow-sm border-l-4 border-l-amber-500">
        <p class="text-xs font-semibold text-ccss-500 uppercase tracking-wider">Pendientes</p>
        <p class="text-2xl font-bold text-ccss-900" id="totalPendientes">0</p>
      </div>
    </div>

    <!-- Tabla -->
    <div class="glass-panel rounded-2xl border border-ccss-200 shadow-lg overflow-hidden mb-8">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-ccss-50">
            <tr class="border-b-2 border-ccss-200">
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Fecha</th>
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Entrada</th>
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Salida</th>
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Horas</th>
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Área</th>
              <th class="text-left py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Observaciones</th>
              <th class="text-center py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider">Estado</th>
              <th class="text-center py-3 px-4 text-xs font-bold text-ccss-600 uppercase tracking-wider no-print">Acción</th>
            </tr>
          </thead>
          <tbody id="tablaExtrasBody" class="divide-y divide-ccss-100">
            <tr>
              <td colspan="8" class="py-8 text-center text-ccss-400">
                <i data-lucide="loader-2" class="w-6 h-6 mx-auto mb-2 animate-spin"></i>
                Cargando registros...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toastContainer" class="fixed top-4 right-4 z-[100] space-y-2 pointer-events-none"></div>

  <script type="module">
    // ============================================
    // FIREBASE
    // ============================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      getDocs, 
      doc, 
      updateDoc,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDigm9JWEqr5h0YV3H6a-H3ub4N__2Y2q4",
      authDomain: "interinos-ccss.firebaseapp.com",
      projectId: "interinos-ccss",
      storageBucket: "interinos-ccss.firebasestorage.app",
      messagingSenderId: "1098694984589",
      appId: "1:1098694984589:web:180af36da33ff6a161b3c4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ============================================
    // 🔧 UTILIDADES DE FECHA CORREGIDAS
    // ============================================
    
    function fechaAString(anio, mes, dia) {
      return `${anio}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
    }

    function parseFechaString(fechaStr) {
      const [a, m, d] = fechaStr.split('-').map(Number);
      return { anio: a, mes: m - 1, dia: d };
    }

    /**
     * Obtiene componentes de fecha de un input type="date" (YYYY-MM-DD)
     * SIN crear Date object para evitar desfase
     */
    function getFechaInput(inputValue) {
      if (!inputValue) return null;
      return parseFechaString(inputValue);
    }

    /**
     * Verifica si fecha string pertenece a mes/año específicos
     */
    function fechaEnMesAnio(fechaStr, mes, anio) {
      const f = parseFechaString(fechaStr);
      return f.mes === mes && f.anio === anio;
    }

    // ============================================
    // ESTADO
    // ============================================
    const usuario = JSON.parse(localStorage.getItem("usuarioActivo"));
    if (!usuario) {
      window.location.href = "login.html";
    }

    document.getElementById("nombreUsuario").textContent = usuario.nombre || "Usuario";
    document.getElementById("rolUsuario").textContent = usuario.rol || "Usuario";
    document.getElementById("userAvatar").textContent = (usuario.nombre || 'U').substring(0, 2).toUpperCase();

    // ============================================
    // ELEMENTOS
    // ============================================
    const entrada = document.getElementById("entradaExtra");
    const salida = document.getElementById("salidaExtra");
    const horasInput = document.getElementById("horasExtra");
    const fechaExtra = document.getElementById("fechaExtra");

    // ============================================
    // CÁLCULO DE HORAS
    // ============================================
    function calcularHorasExtra() {
      if (!entrada.value || !salida.value) {
        horasInput.value = "";
        return;
      }
      
      const [h1, m1] = entrada.value.split(":").map(Number);
      const [h2, m2] = salida.value.split(":").map(Number);
      
      let diffMinutos = (h2 * 60 + m2) - (h1 * 60 + m1);
      
      // Si la salida es antes de la entrada, asumimos turno nocturno (24h +)
      if (diffMinutos < 0) {
        diffMinutos += 24 * 60;
      }
      
      const horas = Math.floor(diffMinutos / 60);
      const minutos = diffMinutos % 60;
      
      horasInput.value = `${horas}h ${minutos}m`;
    }

    entrada.addEventListener("change", calcularHorasExtra);
    salida.addEventListener("change", calcularHorasExtra);

    // ============================================
    // GENERAR AÑOS
    // ============================================
    function generarAnios() {
      const select = document.getElementById("anioFiltroExtra");
      const yearActual = new Date().getFullYear();
      select.innerHTML = "";
      for (let y = yearActual + 1; y >= yearActual - 5; y--) {
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        select.appendChild(opt);
      }
      select.value = yearActual;
    }

    // ============================================
    // GUARDAR TIEMPO EXTRA
    // ============================================
    document.getElementById("formExtra").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      if (!fechaExtra.value) {
        mostrarToast("Seleccione una fecha", "error");
        return;
      }
      
      if (!horasInput.value) {
        mostrarToast("Calcule las horas primero", "error");
        return;
      }

      try {
        await addDoc(collection(db, "tiempoExtra"), {
          fecha: fechaExtra.value, // Guardamos como YYYY-MM-DD directamente
          entrada: entrada.value,
          salida: salida.value,
          horas: horasInput.value,
          estado: false,
          area: document.getElementById("areaExtra").value.trim(),
          observaciones: document.getElementById("observacionesExtra").value.trim(),
          usuarioCedula: usuario.cedula,
          usuarioNombre: usuario.nombre,
          createdAt: new Date().toISOString()
        });

        mostrarToast("Tiempo extra guardado correctamente", "success");
        limpiarFormularioExtra();
        cargarExtras();
      } catch (error) {
        mostrarToast("Error al guardar: " + error.message, "error");
      }
    });

    function limpiarFormularioExtra() {
      document.getElementById("formExtra").reset();
      horasInput.value = "";
    }
    window.limpiarFormularioExtra = limpiarFormularioExtra;

    // ============================================
    // CARGAR REGISTROS (CON FILTRO CORREGIDO)
    // ============================================
    async function cargarExtras() {
      const tbody = document.getElementById("tablaExtrasBody");
      tbody.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-ccss-400"><i data-lucide="loader-2" class="w-6 h-6 mx-auto mb-2 animate-spin"></i>Cargando...</td></tr>';
      lucide.createIcons();

      const mesSel = document.getElementById("mesFiltroExtra").value;
      const anioSel = parseInt(document.getElementById("anioFiltroExtra").value);

      try {
        const snapshot = await getDocs(collection(db, "tiempoExtra"));
        const registros = [];

        snapshot.forEach(docSnap => {
          const r = docSnap.data();
          if (r.usuarioCedula !== usuario.cedula) return;

          // 🔧 CORRECCIÓN CRÍTICA: Parsear fecha string sin new Date(string)
          const fechaComp = getFechaInput(r.fecha);
          if (!fechaComp) return;

          // Filtro por mes (si se seleccionó)
          if (mesSel !== "" && fechaComp.mes !== parseInt(mesSel)) return;
          
          // Filtro por año
          if (!isNaN(anioSel) && fechaComp.anio !== anioSel) return;

          registros.push({ ...r, id: docSnap.id });
        });

        // Ordenar por fecha (comparando strings YYYY-MM-DD funciona correctamente)
        registros.sort((a, b) => a.fecha.localeCompare(b.fecha));

        if (registros.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-ccss-400">No se encontraron registros para los filtros seleccionados</td></tr>';
          actualizarTotales(0, "0h 0m", 0, 0);
          return;
        }

        renderizarTabla(registros);
      } catch (error) {
        tbody.innerHTML = `<tr><td colspan="8" class="py-8 text-center text-red-500">Error: ${error.message}</td></tr>`;
      }
    }

    function renderizarTabla(registros) {
      const tbody = document.getElementById("tablaExtrasBody");
      tbody.innerHTML = "";
      
      let totalMinutos = 0;
      let totalPagados = 0;
      let totalPendientes = 0;

      registros.forEach(registro => {
        // Parsear horas para totales
        if (registro.horas) {
          const match = registro.horas.match(/(\d+)h\s*(\d+)m/);
          if (match) {
            totalMinutos += parseInt(match[1]) * 60 + parseInt(match[2]);
          }
        }

        if (registro.estado) totalPagados++;
        else totalPendientes++;

        const tr = document.createElement("tr");
        tr.className = "hover:bg-ccss-50 transition-colors group";
        
        const estadoBadge = registro.estado
          ? '<span class="px-2 py-1 bg-emerald-100 text-emerald-700 text-xs font-semibold rounded-full border border-emerald-200">Pagado</span>'
          : '<span class="px-2 py-1 bg-amber-100 text-amber-700 text-xs font-semibold rounded-full border border-amber-200">Pendiente</span>';

        tr.innerHTML = `
          <td class="py-3 px-4 text-sm text-ccss-900 font-medium">${registro.fecha}</td>
          <td class="py-3 px-4">
            <input type="time" value="${registro.entrada || ''}" data-id="${registro.id}" class="entrada-edit w-24 px-2 py-1 border border-ccss-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 text-center">
          </td>
          <td class="py-3 px-4">
            <input type="time" value="${registro.salida || ''}" data-id="${registro.id}" class="salida-edit w-24 px-2 py-1 border border-ccss-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 text-center">
          </td>
          <td class="py-3 px-4 text-sm font-bold text-ccss-700">
            <input type="text" value="${registro.horas || ''}" readonly data-id="${registro.id}" class="horas-edit w-20 px-2 py-1 border border-ccss-200 rounded-lg text-sm bg-ccss-50 text-center font-bold">
          </td>
          <td class="py-3 px-4">
            <input type="text" value="${registro.area || ''}" data-id="${registro.id}" class="area-edit px-2 py-1 border border-ccss-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 w-full">
          </td>
          <td class="py-3 px-4">
            <input type="text" value="${registro.observaciones || ''}" data-id="${registro.id}" class="obs-edit px-2 py-1 border border-ccss-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-ccss-500 bg-white text-ccss-900 w-full">
          </td>
          <td class="py-3 px-4 text-center">
            <label class="inline-flex items-center cursor-pointer">
              <input type="checkbox" ${registro.estado ? "checked" : ""} data-id="${registro.id}" class="estado-edit w-5 h-5 rounded border-ccss-300 text-ccss-600 focus:ring-ccss-500">
            </label>
          </td>
          <td class="py-3 px-4 text-center no-print">
            <button class="guardar-edit px-3 py-1.5 bg-ccss-600 hover:bg-ccss-700 text-white text-sm rounded-lg transition-colors shadow-sm" data-id="${registro.id}">
              <i data-lucide="save" class="w-4 h-4 inline"></i>
            </button>
          </td>
        `;
        
        tbody.appendChild(tr);
      });

      // Activar eventos de edición
      activarEdicionInline();

      // Actualizar totales
      const totalHorasFormateadas = `${Math.floor(totalMinutos / 60)}h ${totalMinutos % 60}m`;
      actualizarTotales(registros.length, totalHorasFormateadas, totalPagados, totalPendientes);
    }

    function activarEdicionInline() {
      // Recalcular horas al cambiar entrada/salida
      document.querySelectorAll(".entrada-edit, .salida-edit").forEach(input => {
        input.addEventListener("change", function() {
          const id = this.dataset.id;
          const entradaVal = document.querySelector(`.entrada-edit[data-id="${id}"]`).value;
          const salidaVal = document.querySelector(`.salida-edit[data-id="${id}"]`).value;
          
          if (entradaVal && salidaVal) {
            const [h1, m1] = entradaVal.split(":").map(Number);
            const [h2, m2] = salidaVal.split(":").map(Number);
            let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
            if (diff < 0) diff += 24 * 60;
            const horas = Math.floor(diff / 60);
            const minutos = diff % 60;
            document.querySelector(`.horas-edit[data-id="${id}"]`).value = `${horas}h ${minutos}m`;
          }
        });
      });

      // Guardar cambios
      document.querySelectorAll(".guardar-edit").forEach(btn => {
        btn.addEventListener("click", async function() {
          const id = this.dataset.id;
          const entradaVal = document.querySelector(`.entrada-edit[data-id="${id}"]`).value;
          const salidaVal = document.querySelector(`.salida-edit[data-id="${id}"]`).value;
          const horasVal = document.querySelector(`.horas-edit[data-id="${id}"]`).value;
          const areaVal = document.querySelector(`.area-edit[data-id="${id}"]`).value;
          const obsVal = document.querySelector(`.obs-edit[data-id="${id}"]`).value;
          const estadoVal = document.querySelector(`.estado-edit[data-id="${id}"]`).checked;

          try {
            await updateDoc(doc(db, "tiempoExtra", id), {
              entrada: entradaVal,
              salida: salidaVal,
              horas: horasVal,
              area: areaVal,
              observaciones: obsVal,
              estado: estadoVal,
              updatedAt: new Date().toISOString()
            });
            
            mostrarToast("Registro actualizado", "success");
            cargarExtras();
          } catch (error) {
            mostrarToast("Error al actualizar: " + error.message, "error");
          }
        });
      });
    }

    function actualizarTotales(totalRegistros, totalHoras, totalPagados, totalPendientes) {
      document.getElementById("totalRegistros").textContent = totalRegistros;
      document.getElementById("totalHoras").textContent = totalHoras;
      document.getElementById("totalPagados").textContent = totalPagados;
      document.getElementById("totalPendientes").textContent = totalPendientes;
    }

      totalesDiv.innerHTML = `
        <div style="text-align: center;">

    // ============================================
    // TOASTS
    // ============================================
    function mostrarToast(mensaje, tipo = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const colores = {
        success: 'bg-emerald-50 border-emerald-400 text-emerald-800',
        error: 'bg-red-50 border-red-400 text-red-800',
        info: 'bg-ccss-50 border-ccss-400 text-ccss-800'
      };
      const iconos = { success: '✅', error: '❌', info: 'ℹ️' };
      
      toast.className = `pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-xl border shadow-lg ${colores[tipo]} animate-[fadeIn_0.3s_ease-out]`;
      toast.innerHTML = `<span>${iconos[tipo]}</span><span class="font-medium text-sm">${mensaje}</span>`;
      
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
